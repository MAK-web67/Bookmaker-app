<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>Commander — Bookmaker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
–color: #D4A843;
–bg: #0C0C0A;
–surface: #141412;
–card: #1C1A17;
–border: #272420;
–text: #EDE8DF;
–muted: #6B6560;
–soft: #9B9590;
–green: #3DAA6A;
–red: #C94040;
}

body {
background: #0C0C0A !important;
color: #EDE8DF !important;
font-family: ‘DM Sans’, sans-serif;
min-height: 100vh;
display: flex;
flex-direction: column;
-webkit-text-size-adjust: 100%;
}

/* LOADING */
#loading {
position: fixed; inset: 0; z-index: 999;
background: #0C0C0A;
display: flex; flex-direction: column;
align-items: center; justify-content: center; gap: 16px;
}
.loader {
width: 40px; height: 40px; border-radius: 50%;
border: 3px solid #272420;
border-top-color: var(–color);
animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ERROR */
#error-screen {
display: none; position: fixed; inset: 0;
background: #0C0C0A;
flex-direction: column; align-items: center; justify-content: center;
text-align: center; padding: 32px;
}

/* TOPBAR */
.topbar {
background: #141412;
border-bottom: 1px solid #272420;
padding: 12px 16px;
display: flex; align-items: center; justify-content: space-between;
position: sticky; top: 0; z-index: 100;
}
.resto-info { display: flex; align-items: center; gap: 10px; }
.resto-avatar {
width: 36px; height: 36px; border-radius: 10px;
display: flex; align-items: center; justify-content: center;
font-size: 1.1rem; background: rgba(212,168,67,0.15);
color: var(–color);
}
.resto-name { font-family: ‘Syne’, sans-serif; font-size: 0.95rem; font-weight: 700; }
.resto-city { font-size: 0.72rem; color: #6B6560; }
.powered-by { font-size: 0.7rem; color: #6B6560; }

/* TABS */
.tabs {
display: flex; background: #141412;
border-bottom: 1px solid #272420;
}
.tab {
flex: 1; padding: 12px 8px; font-size: 0.8rem;
color: #6B6560; cursor: pointer; text-align: center;
border-bottom: 2px solid transparent; transition: all 0.2s;
display: flex; align-items: center; justify-content: center; gap: 5px;
}
.tab.active { color: var(–color); border-bottom-color: var(–color); }

/* PANELS */
.panel { display: none; flex: 1; flex-direction: column; }
.panel.active { display: flex; }

/* CHAT */
.chat-wrap { display: flex; flex-direction: column; height: calc(100vh - 160px); }
.messages {
flex: 1; overflow-y: auto; padding: 16px;
display: flex; flex-direction: column; gap: 14px;
scrollbar-width: thin; scrollbar-color: #272420 transparent;
}
.msg { display: flex; gap: 10px; animation: fadeUp 0.3s ease; }
.msg.user { flex-direction: row-reverse; }
.av {
width: 34px; height: 34px; border-radius: 50%;
flex-shrink: 0; display: flex; align-items: center;
justify-content: center; font-size: 0.9rem;
}
.av.ai { font-weight: 800; color: #0C0C0A; }
.av.user { background: #1C1A17; border: 1px solid #272420; }
.bub {
max-width: 72%; padding: 11px 14px; border-radius: 14px;
font-size: 0.88rem; line-height: 1.6;
}
.bub.ai { background: #1C1A17; border: 1px solid #272420; border-radius: 4px 14px 14px 14px; }
.bub.user { color: #0C0C0A; border-radius: 14px 4px 14px 14px; font-weight: 500; }
.typing-dots { display: flex; gap: 4px; padding: 3px 0; align-items: center; }
.typing-dots span { width: 6px; height: 6px; border-radius: 50%; animation: bounce 1.2s infinite; background: var(–color); }
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-6px);opacity:1} }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

.quick-row {
padding: 8px 12px; display: flex; gap: 8px;
overflow-x: auto; scrollbar-width: none;
border-top: 1px solid #272420;
}
.q-btn {
background: #1C1A17; border: 1px solid #272420;
color: #EDE8DF; padding: 6px 12px; border-radius: 20px;
font-size: 0.78rem; cursor: pointer; white-space: nowrap;
transition: all 0.2s; font-family: ‘DM Sans’, sans-serif;
}
.q-btn:hover { border-color: var(–color); color: var(–color); }

.input-row {
padding: 10px 12px; display: flex; gap: 8px;
background: #141412; border-top: 1px solid #272420;
}
.input-row input {
flex: 1; background: #1C1A17; border: 1px solid #272420;
color: #EDE8DF; padding: 11px 14px; border-radius: 22px;
font-size: 0.88rem; font-family: ‘DM Sans’, sans-serif;
outline: none; transition: border-color 0.2s;
}
.input-row input:focus { border-color: var(–color); }
.input-row input::placeholder { color: #6B6560; }
.send-btn {
background: var(–color); border: none; color: #0C0C0A;
width: 42px; height: 42px; border-radius: 50%;
cursor: pointer; font-size: 1rem;
display: flex; align-items: center; justify-content: center;
transition: all 0.2s; flex-shrink: 0;
}
.send-btn:disabled { background: #272420; cursor: not-allowed; }

/* MENU */
.menu-wrap { padding: 14px; overflow-y: auto; flex: 1; }
.cat-title {
font-family: ‘Syne’, sans-serif; font-size: 0.9rem;
font-weight: 700; color: var(–color);
margin: 14px 0 8px; display: flex; align-items: center; gap: 6px;
}
.menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(148px,1fr)); gap: 10px; margin-bottom: 8px; }
.m-card {
background: #1C1A17; border: 1px solid #272420;
border-radius: 12px; padding: 14px; cursor: pointer; transition: all 0.2s;
}
.m-card:hover { border-color: var(–color); transform: translateY(-2px); }
.m-emoji { font-size: 1.7rem; margin-bottom: 8px; }
.m-name { font-size: 0.85rem; font-weight: 600; margin-bottom: 3px; }
.m-price { font-size: 0.82rem; color: var(–color); font-weight: 700; }
.m-desc { font-size: 0.72rem; color: #6B6560; margin-top: 4px; }

/* ORDER */
.order-wrap { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
.o-item {
background: #1C1A17; border: 1px solid #272420;
border-radius: 12px; padding: 14px;
display: flex; align-items: center; gap: 12px;
}
.o-info { flex: 1; }
.o-name { font-size: 0.88rem; font-weight: 600; }
.o-price { font-size: 0.82rem; color: var(–color); margin-top: 2px; }
.qty-ctrl { display: flex; align-items: center; gap: 8px; }
.qty-btn {
background: #141412; border: 1px solid #272420;
color: #EDE8DF; width: 26px; height: 26px; border-radius: 50%;
cursor: pointer; font-size: 1rem;
display: flex; align-items: center; justify-content: center;
transition: all 0.2s; font-family: ‘DM Sans’, sans-serif;
}
.qty-btn:hover { border-color: var(–color); color: var(–color); }
.qty { font-size: 0.88rem; min-width: 18px; text-align: center; }

.order-footer { background: #141412; border-top: 1px solid #272420; padding: 14px; }
.total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.total-lbl { font-size: 0.88rem; color: #6B6560; }
.total-val { font-family: ‘Syne’, sans-serif; font-size: 1.3rem; color: var(–color); font-weight: 800; }
.confirm-btn {
width: 100%; background: var(–red); border: none; color: white;
padding: 14px; border-radius: 10px; font-size: 0.92rem; font-weight: 700;
font-family: ‘Syne’, sans-serif; cursor: pointer; transition: all 0.2s;
}
.confirm-btn:hover { background: #d44444; }

.empty-state { text-align: center; padding: 48px 24px; color: #6B6560; }
.empty-state .big { font-size: 3rem; margin-bottom: 12px; }
.empty-state p { font-size: 0.88rem; }

/* CART BADGE */
.cart-badge {
background: var(–red); color: white;
width: 17px; height: 17px; border-radius: 50%;
font-size: 0.68rem; display: inline-flex;
align-items: center; justify-content: center; font-weight: 700;
}

/* TOAST */
.toast {
position: fixed; bottom: 80px; left: 50%;
transform: translateX(-50%) translateY(20px);
background: #3DAA6A; color: white; padding: 9px 18px;
border-radius: 22px; font-size: 0.82rem; font-weight: 500;
opacity: 0; transition: all 0.3s; z-index: 999; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* FOOTER */
.client-footer {
background: #111110; border-top: 1px solid #272420;
padding: 12px 16px; text-align: center;
}
.client-footer a {
font-size: 0.75rem; color: #6B6560;
text-decoration: none;
display: inline-flex; align-items: center; gap: 6px;
}
</style>

</head>

<script>
// ===== STATE =====
let resto = {};
let cart = [];
let isTyping = false;
let apiKey = '';

// ===== INIT =====
window.onload = () => {
  const params = new URLSearchParams(window.location.search);
  const data = params.get('data');

  if (!data) {
    showError();
    return;
  }

  try {
    const decoded = JSON.parse(decodeURIComponent(atob(data)));
    resto = decoded;
    apiKey = decoded.apiKey || '';

    // Apply restaurant color
    if (resto.color) {
      document.documentElement.style.setProperty('--color', resto.color);
    }

    // Update topbar
    document.getElementById('c-avatar').textContent = resto.emoji || '🍽️';
    document.getElementById('c-avatar').style.background = (resto.color || '#D4A843') + '22';
    document.getElementById('c-avatar').style.color = resto.color || '#D4A843';
    document.getElementById('c-name').textContent = resto.name || 'Restaurant';
    document.getElementById('c-city').textContent = resto.city || 'Brazzaville';
    document.title = (resto.name || 'Restaurant') + ' — Commander';

    // Hide loading, show app
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'flex';

    // Init
    initChat();
    renderMenu();

  } catch(e) {
    showError();
  }
};

function showError() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-screen').style.display = 'flex';
}

// ===== TABS =====
function switchTab(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  document.getElementById('tab-' + id).classList.add('active');
  if (id === 'order') renderOrder();
}

// ===== CHAT =====
function initChat() {
  addMsg('ai', 'Bienvenue chez ' + (resto.name||'nous') + ' ! Ravi de vous accueillir. Je suis votre serveur, je connais tout notre menu sur le bout des doigts. Qu est-ce qui vous ferait plaisir aujourd hui ?');
  renderQuick();
}

function renderQuick() {
  const c = document.getElementById('quick-row');
  const qs = ['Voir le menu 🍽️', 'Vos spécialités ?', 'Délai de préparation ?'];
  c.innerHTML = qs.map(q =>
    '<button class="q-btn" onclick="sendQuick(this.textContent)">' + q + '</button>'
  ).join('');
}

function addMsg(role, text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const html = text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  const color = resto.color || '#D4A843';
  const av = role === 'ai'
    ? '<div class="av ai" style="background:' + color + '22;color:' + color + '">' + (resto.emoji||'🍽️') + '</div>'
    : '<div class="av user">👤</div>';
  const bub = role === 'ai'
    ? '<div class="bub ai">' + html + '</div>'
    : '<div class="bub user" style="background:' + color + '">' + html + '</div>';
  div.innerHTML = role === 'ai' ? av + bub : bub + av;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg ai'; d.id = 'typing';
  const color = resto.color || '#D4A843';
  d.innerHTML = '<div class="av ai" style="background:' + color + '22;color:' + color + '">' + (resto.emoji||'🍽️') + '</div>' +
    '<div class="bub ai"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() { const el = document.getElementById('typing'); if(el) el.remove(); }

async function sendMsg() {
  const inp = document.getElementById('chat-input');
  const text = inp.value.trim();
  if (!text || isTyping) return;
  inp.value = '';
  addMsg('user', text);
  await getReply(text);
}

function sendQuick(t) {
  document.getElementById('chat-input').value = t;
  sendMsg();
}

async function getReply(userMsg) {
  isTyping = true;
  document.getElementById('send-btn').disabled = true;
  showTyping();

  const menu = resto.restaurantMenu || [];
  const menuCtx = menu.length > 0
    ? menu.map(i => '- ' + i.nameFr + ': ' + Number(i.price).toLocaleString() + ' FCFA').join('\n')
    : 'Menu en cours de configuration.';

  const sys = 'Tu es l\'assistante de "' + (resto.name||'ce restaurant') + '", situé à ' + (resto.city||'Brazzaville') + '.\n\n' +
    'Personnalité : professionnelle, efficace et agréable. Chaleureuse sans en faire trop. 2-3 phrases max.\n\n' +
    'Menu :\n' + menuCtx;

  try {
    const key = apiKey || (resto.apiKey || '');
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 300,
        system: sys,
        messages: [{role:'user', content: userMsg}]
      })
    });
    const data = await res.json();
    removeTyping();
    addMsg('ai', data.content?.[0]?.text || 'Désolé, je n\'ai pas pu répondre.');
  } catch(e) {
    removeTyping();
    addMsg('ai', 'Connexion impossible. Réessayez.');
  }
  isTyping = false;
  document.getElementById('send-btn').disabled = false;
}

// ===== MENU =====
function renderMenu() {
  const c = document.getElementById('menu-wrap');
  const menu = resto.restaurantMenu || [];

  if (menu.length === 0) {
    c.innerHTML = '<div class="empty-state"><div class="big">🍽️</div><p>Menu en cours de préparation</p></div>';
    return;
  }

  const categories = {};
  menu.forEach(item => {
    const cat = item.category || 'Menu';
    if (!categories[cat]) categories[cat] = [];
    categories[cat].push(item);
  });

  let html = '';
  Object.entries(categories).forEach(([cat, items]) => {
    html += '<div class="cat-title">🍽️ ' + cat + '</div><div class="menu-grid">';
    html += items.map(item =>
      '<div class="m-card" onclick="addToCart(\'' + item.id + '\')">' +
      '<div class="m-emoji">' + (item.emoji||'🍽️') + '</div>' +
      '<div class="m-name">' + item.nameFr + '</div>' +
      '<div class="m-price">' + Number(item.price).toLocaleString() + ' FCFA</div>' +
      '<div class="m-desc">' + (item.description||'') + '</div>' +
      '</div>'
    ).join('');
    html += '</div>';
  });
  c.innerHTML = html;
}

// ===== CART =====
function addToCart(id) {
  const item = (resto.restaurantMenu||[]).find(i => i.id === id);
  if (!item) return;
  const ex = cart.find(c => c.id === id);
  if (ex) ex.qty++;
  else cart.push({...item, qty:1});
  updateBadge();
  showToast('✓ Ajouté !');
}

function updateBadge() {
  const total = cart.reduce((s,i) => s+i.qty, 0);
  const b = document.getElementById('cart-badge');
  b.textContent = total;
  b.style.display = total > 0 ? 'inline-flex' : 'none';
}

function renderOrder() {
  const c = document.getElementById('order-wrap');
  const footer = document.getElementById('order-footer');

  if (!cart.length) {
    c.innerHTML = '<div class="empty-state"><div class="big">🛒</div><p>Votre panier est vide</p><p style="margin-top:6px;font-size:0.78rem">Explorez le menu et ajoutez des plats</p></div>';
    footer.style.display = 'none';
    return;
  }

  footer.style.display = 'block';
  c.innerHTML = cart.map(item =>
    '<div class="o-item">' +
    '<div style="font-size:1.5rem">' + (item.emoji||'🍽️') + '</div>' +
    '<div class="o-info">' +
      '<div class="o-name">' + item.nameFr + '</div>' +
      '<div class="o-price">' + (Number(item.price)*item.qty).toLocaleString() + ' FCFA</div>' +
    '</div>' +
    '<div class="qty-ctrl">' +
      '<button class="qty-btn" onclick="changeQty(\'' + item.id + '\',-1)">−</button>' +
      '<span class="qty">' + item.qty + '</span>' +
      '<button class="qty-btn" onclick="changeQty(\'' + item.id + '\',1)">+</button>' +
    '</div></div>'
  ).join('');

  const total = cart.reduce((s,i) => s + Number(i.price)*i.qty, 0);
  document.getElementById('total-val').textContent = total.toLocaleString() + ' FCFA';
}

function changeQty(id, d) {
  const i = cart.findIndex(c => c.id === id);
  if (i === -1) return;
  cart[i].qty += d;
  if (cart[i].qty <= 0) cart.splice(i, 1);
  updateBadge();
  renderOrder();
}

function confirmOrder() {
  const count = cart.reduce((s,i) => s+i.qty, 0);
  const total = cart.reduce((s,i) => s+Number(i.price)*i.qty, 0);
  cart = [];
  updateBadge();
  renderOrder();
  addMsg('ai', '✅ Commande confirmée ! ' + count + ' article(s) — ' + total.toLocaleString() + ' FCFA.\n⏱️ Temps estimé : 20-30 min. Merci ! 😊');
  switchTab('chat');
  showToast('🎉 Commande confirmée !');
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
